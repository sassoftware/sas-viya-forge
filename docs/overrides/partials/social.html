{% if config.extra.social %}
  <div class="md-social">
    {% for social in config.extra.social %}
      <a href="{{ social.link }}" target="_blank" rel="noopener" title="{{ social.name | d('', true) }}" class="md-social__link">
        {% include ".icons/" ~ social.icon ~ ".svg" %}
        {% if social.name %}
          <span class="md-social__text" style="margin-left: 0.5rem; vertical-align: middle;">{{ social.name }}</span>
        {% endif %}
      </a>
    {% endfor %}
  </div>
{% endif %}
